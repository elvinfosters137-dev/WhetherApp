<!DOCTYPE html>
<html>
<head>
  <title>Enhanced OOP Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Enhanced Weather App (OOP + Forecast)</h1>

  <div class="search-box">
    <input type="text" id="cityInput" placeholder="Enter city name">
    <button id="searchBtn">Search</button>
    <button id="unitBtn">Switch °C / °F</button>
  </div>

  <div id="loading"></div>

  <div id="current" class="current-weather"></div>

  <h2>5-Day Forecast</h2>
  <div id="forecast"></div>

  <script src="script.js"></script>
</body>
</html>
